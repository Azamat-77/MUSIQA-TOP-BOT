<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TapCoin Game</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 15px;
  font-size: 28px;
}

/* CENTER */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 85vh;
}

/* 🟡 BIG GOLD COIN */
.coin {
  width: 340px;
  height: 340px;
  background: url("https://cdn-icons-png.flaticon.com/512/2160/2160420.png") center/cover no-repeat;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 0 70px gold;
}

.coin:active {
  transform: scale(0.88);
}

/* TEXT */
.box {
  margin-top: 18px;
  font-size: 26px;
}

/* BUTTON */
button {
  margin-top: 25px;
  padding: 15px 30px;
  font-size: 20px;
  background: gold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🪙 TAPCOIN GAME</h1>

<div class="container">

  <div class="box">
    💰 Balance: <span id="bal">0</span>
  </div>

  <div class="box">
    ⚡ Taps: <span id="tap">0</span>/500
  </div>

  <div class="coin" onclick="tapCoin()"></div>

  <button onclick="tapCoin()">TAP COIN</button>

</div>

<script>
let bal = 0;
let tap = 0;
let limit = 500;

function tapCoin(){
    if(tap >= limit){
        alert("❌ Limit tugadi (500)");
        return;
    }

    bal++;
    tap++;

    document.getElementById("bal").innerText = bal;
    document.getElementById("tap").innerText = tap;
}
</script>

</body>
</html>
